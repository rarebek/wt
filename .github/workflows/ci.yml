name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.22', '1.23', '1.24', '1.25']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -v -count=1 -timeout=60s

      - name: Test Race (Linux only, requires cgo)
        if: runner.os == 'Linux'
        run: go test ./... -race -count=1 -timeout=120s

  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Benchmark
        run: go test -bench=. -benchmem -count=1 -timeout=120s ./...

  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Fuzz Router
        run: go test -fuzz=FuzzMatchPattern -fuzztime=30s

      - name: Fuzz ParamNames
        run: go test -fuzz=FuzzExtractParamNames -fuzztime=15s

      - name: Fuzz Segments
        run: go test -fuzz=FuzzCountSegments -fuzztime=15s

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Vet
        run: go vet ./...
